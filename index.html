<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confissões ao Luar</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="container">
        <!-- O wrapper ajusta o próprio tamanho ao da imagem de fundo -->
        <div class="image-wrapper">
            <img src="/capa.png" alt="Confissões ao Luar" class="background">
            
            <!-- Agora o botão vive DENTRO do wrapper, então se posiciona em relação à imagem -->
            <button id="btn-entrar" class="enter-button">
                <img src="/botao.png" alt="" class="button-bg">
                <span class="button-text">ENTRAR</span>
            </button>
        </div>
    </div>
    <script type="module" src="/script.js"></script>
</body>
</html>
